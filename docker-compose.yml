services:
  usage-api:
    image: python:3.12-slim
    container_name: claude-usage-api
    restart: unless-stopped
    working_dir: /app
    command: ["python", "server.py"]
    environment:
      API_KEY: ${API_KEY:?set API_KEY in .env}
      USAGE_FILE: /data/usage.txt
      PORT: "8000"
    volumes:
      - ./server.py:/app/server.py:ro
      - ./usage.txt:/data/usage.txt:ro
    ports:
      - "8091:8000"
    networks:
      - default
      - cloudflared

networks:
  cloudflared:
    external: true
    name: 0-tunnel_cloudflared
