services:
  usage-api:
    image: python:3.12-slim
    container_name: claude-usage-api
    restart: unless-stopped
    working_dir: /app
    command: ["python", "server.py"]
    # .env อยู่ที่ repo root (สองระดับขึ้นไป) — ต้องมี API_KEY
    env_file:
      - ../../.env
    environment:
      USAGE_FILE: /data/usage.txt
      PORT: "8000"
    volumes:
      - ./server.py:/app/server.py:ro
      - ../../usage.txt:/data/usage.txt:ro   # usage.txt ผลิตโดย get-usage.sh ที่ repo root
    ports:
      - "8091:8000"
    networks:
      - default
      - cloudflared

networks:
  cloudflared:
    external: true
    name: 0-tunnel_cloudflared
